<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Bookings — Paramount Hotel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="location.href='index.html'"><span>Paramount</span> Hotel</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="bookings.html" class="active">My Bookings</a>
    <a href="contact.html">Contact</a>
  </div>
  <div id="nav-auth"></div>
  <button class="hamburger" onclick="toggleMob()">&#9776;</button>
</nav>
<div class="mobile-menu" id="mob">
  <a href="index.html">Home</a>
  <a href="rooms.html">Rooms</a>
  <a href="bookings.html">My Bookings</a>
  <a href="contact.html">Contact</a>
</div>

<div class="bookings-header">
  <div class="section-label">My Reservations</div>
  <div class="section-title">Your Bookings</div>
  <p class="section-sub">Manage all your upcoming and past reservations with Paramount Hotel.</p>
</div>

<!-- Filter tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="filterTab('all',this)">All</button>
  <button class="tab-btn" onclick="filterTab('Confirmed',this)">Confirmed</button>
  <button class="tab-btn" onclick="filterTab('Cancelled',this)">Cancelled</button>
</div>

<div class="bookings-list" id="bookings-list"></div>

<footer class="site-footer" style="margin-top:60px">
  <div class="footer-bottom" style="border-top:none">
    <span>© 2024 Paramount Hotel by Aayush Kumar. All rights reserved.</span>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/backend.js"></script>
<script>
  window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>10));
  function toggleMob(){document.getElementById('mob').classList.toggle('open');}

  const s=DB.getSession();
  (function refreshNav(){
    const a=document.getElementById('nav-auth');
    if(s) a.innerHTML=`<span style="font-size:.7rem;letter-spacing:1.5px;color:var(--gold);margin-right:12px">Hi, ${s.name.split(' ')[0]}</span><button class="nav-btn solid" onclick="DB.clearSession();location.href='index.html'">Sign Out</button>`;
    else  a.innerHTML=`<button class="nav-btn" onclick="location.href='login.html'">Sign In</button>`;
  })();

  if(!s){ location.href='login.html'; }

  let activeTab='all';

  function filterTab(tab,btn){
    activeTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderBookings();
  }

  function renderBookings(){
    const el=document.getElementById('bookings-list');
    if(!s){el.innerHTML='<div class="no-bookings">Please sign in to view your bookings.</div>';return;}
    let list=DB.getByUser(s.email).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(activeTab!=='all') list=list.filter(b=>b.status===activeTab);
    if(!list.length){
      el.innerHTML=`<div class="no-bookings">No ${activeTab==='all'?'':activeTab.toLowerCase()+' '}reservations found.<br><br><button class="btn-primary" onclick="location.href='rooms.html'" style="font-size:.7rem">Explore Our Suites</button></div>`;
      return;
    }
    el.innerHTML=list.map(b=>{
      const cancelled=b.status==='Cancelled';
      return `<div class="booking-card ${cancelled?'cancelled':''}">
        <img class="booking-img" src="${b.roomImg}" alt="${b.roomName}" onerror="this.src='https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=300&q=80'"/>
        <div class="booking-info">
          <h3>${b.roomName}</h3>
          <div class="booking-dates">
            <span>${fmt(b.checkin)}</span> → <span>${fmt(b.checkout)}</span>
            &nbsp;·&nbsp; ${b.nights} night${b.nights>1?'s':''}
          </div>
          <div class="booking-meta">${b.guests} · ID: <strong style="color:var(--gold-light)">${b.id}</strong></div>
          ${b.special?`<div class="booking-meta" style="color:var(--gold-light);margin-top:3px">Note: ${b.special}</div>`:''}
          <div class="booking-meta" style="font-size:.65rem;margin-top:5px;opacity:.5">Booked on ${fmt(b.createdAt)}</div>
        </div>
        <div class="booking-status-area">
          <span class="status-badge ${cancelled?'status-cancelled':'status-confirmed'}">${b.status}</span>
          <div class="booking-price">₹${b.total.toLocaleString('en-IN')}</div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:2px">₹${b.roomPrice.toLocaleString('en-IN')}/night × ${b.nights}</div>
          ${!cancelled?`<button class="btn-cancel" onclick="cancelBooking('${b.id}')">Cancel</button>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function cancelBooking(id){
    if(!confirm('Are you sure you want to cancel this reservation?')) return;
    DB.cancelBooking(id);
    renderBookings();
    showToast('Reservation cancelled.');
  }

  function fmt(d){return new Date(d).toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}

  let _tt;
  function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3400);}

  renderBookings();
</script>
</body>
</html>


 <style>
    body{padding-top:72px;background:var(--dark);}
    .bookings-header{padding:80px 56px 40px;}
    .tabs{display:flex;gap:10px;padding:0 56px 24px;}
    .tab-btn{background:transparent;border:1px solid rgba(201,169,110,.22);color:var(--muted);padding:8px 22px;font-family:var(--sans);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:20px;transition:var(--t);}
    .tab-btn:hover,.tab-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);}
    @media(max-width:900px){
      .bookings-header{padding:60px 22px 28px;}
      .tabs{padding:0 22px 20px;}
    }
  </style>
